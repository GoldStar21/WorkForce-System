services:
  database:
    image: mysql:8
    restart: always
    container_name: workforce_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: work_force_system
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: workforce_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://database:3306/work_force_system
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      - database

  frontend:
    build: ./frontend
    container_name: workforce_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
